<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="VukaSport - Resultados de Futebol em Tempo Real">
    <meta name="theme-color" content="#1e7e34">
    <title>VukaSport - Live Scores</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">⚽ VukaSport</h1>
                <div class="header-controls">
                    <button id="darkModeToggle" class="btn-icon">🌙</button>
                    <a href="settings.html" class="btn-icon">⚙️</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Date Navigation -->
    <nav class="date-nav">
        <div id="dateList" class="date-list">
            <!-- Datas serão inseridas aqui -->
        </div>
    </nav>

    <!-- Support Banner -->
    <div class="support-banner">
        <span>Gosta da aplicação? <strong>Apoie o projeto!</strong></span>
        <button class="btn-primary" onclick="openSupportModal()" style="margin-left: 10px; padding: 4px 10px; font-size: 11px;">Apoiar</button>
    </div>

    <!-- Main Content -->
    <main class="main">
        <div id="gamesContainer" class="container">
            <!-- Lista de jogos agrupada por competição será carregada aqui -->
            <div id="gamesList">
                <!-- Skeleton/Loading state -->
                <div style="padding: 20px; text-align: center; color: #888;">Carregando jogos...</div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" style="display: none; padding: 40px 20px; text-align: center; color: #888;">
            <p>Nenhum jogo agendado para esta data.</p>
        </div>
    </main>

    <!-- Support Modal -->
    <div id="supportModal" class="modal-admin" style="display: none;">
        <div class="modal-admin-content">
            <div class="modal-admin-header" style="display: flex; justify-content: space-between;">
                <span>Apoie a VukaSport</span>
                <button onclick="closeSupportModal()" style="background:none; border:none; color:white; font-size:20px;">&times;</button>
            </div>
            <p style="font-size: 13px; margin-bottom: 15px; color: #ccc;">Sua contribuição ajuda a manter os servidores ativos.</p>
            <div style="background: #333; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px;">
                <p style="font-size: 11px; color: #888; margin-bottom: 5px;">M-Pesa Moçambique</p>
                <p style="font-size: 20px; font-weight: 800; color: #28A745;">852092063</p>
            </div>
            <button class="btn-primary btn-large" onclick="copyNumber()">Copiar Número</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 VukaSport • <span id="developerName" style="cursor:pointer">Marcos Nhachale</span></p>
        <p id="offlineIndicator" style="display: none; color: #dc3545; margin-top: 5px;">⚠️ Modo Offline</p>
    </footer>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/events.js"></script>
    <script src="js/sample-data.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Lógica de UI específica da página
        let selectedDate = new Date().toISOString().split('T')[0];

        function renderDateNav() {
            const dateList = document.getElementById('dateList');
            dateList.innerHTML = '';
            
            const today = new Date();
            const dates = [];
            
            // Gerar 3 dias antes e 4 dias depois
            for (let i = -3; i <= 4; i++) {
                const d = new Date();
                d.setDate(today.getDate() + i);
                dates.push(d);
            }
            
            dates.forEach(date => {
                const dateStr = date.toISOString().split('T')[0];
                const btn = document.createElement('button');
                btn.className = `date-item ${dateStr === selectedDate ? 'active' : ''}`;
                
                let label = '';
                const dayDiff = Math.floor((date - new Date().setHours(0,0,0,0)) / (1000 * 60 * 60 * 24));
                
                if (dayDiff === 0) label = 'HOJE';
                else if (dayDiff === -1) label = 'ONTEM';
                else if (dayDiff === 1) label = 'AMANHÃ';
                else {
                    const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
                    label = `${days[date.getDay()]} ${date.getDate()}`;
                }
                
                btn.textContent = label;
                btn.onclick = () => {
                    selectedDate = dateStr;
                    renderDateNav();
                    if (window.gameManager) window.gameManager.renderGames();
                };
                dateList.appendChild(btn);
            });
        }

        function openSupportModal() { document.getElementById('supportModal').style.display = 'flex'; }
        function closeSupportModal() { document.getElementById('supportModal').style.display = 'none'; }
        function copyNumber() {
            navigator.clipboard.writeText('852092063');
            alert('Número copiado!');
        }

        // Developer secret access
        let devClicks = 0;
        document.getElementById('developerName').onclick = () => {
            devClicks++;
            if (devClicks >= 6) window.location.href = 'admin.html';
            setTimeout(() => devClicks = 0, 2000);
        };

        // Dark mode
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('vukasport_theme', 'light');
                darkModeToggle.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('vukasport_theme', 'dark');
                darkModeToggle.textContent = '☀️';
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderDateNav();
            if (localStorage.getItem('vukasport_theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                darkModeToggle.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
