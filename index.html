<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="VukaSport - Resultados de Futebol em Tempo Real">
    <meta name="theme-color" content="#1e7e34">
    <title>VukaSport - Live Scores</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icons/icon-192.png">
    <link rel="stylesheet" href="css/style.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=pub-5545529393172719" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <h1 class="logo">⚽ VukaSport</h1>
                <div class="header-controls">
                    <button id="darkModeToggle" class="btn-icon">🌙</button>
                    <a href="settings.html" class="btn-icon">⚙️</a>
                </div>
            </div>
        </div>
    </header>

    <!-- View Toggle (Ao Vivo / Por Data) -->
    <nav class="view-toggle" style="display: flex; gap: 10px; padding: 10px 20px; background: #1e1e1e; border-bottom: 1px solid #333;">
        <button id="btnLiveView" class="view-btn active" style="flex: 1; padding: 10px; background: #28A745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">🔴 AO VIVO</button>
        <button id="btnDateView" class="view-btn" style="flex: 1; padding: 10px; background: #333; color: #888; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">📅 POR DATA</button>
    </nav>

    <!-- Date Navigation (Oculto por padrão) -->
    <nav id="dateNav" class="date-nav" style="display: none;">
        <div id="dateList" class="date-list">
            <!-- Datas serão inseridas aqui -->
        </div>
    </nav>

    <!-- Support Banner -->
    <div class="support-banner">
        <span>Gosta da aplicação? <strong>Apoie o projeto!</strong></span>
        <button class="btn-primary" onclick="openSupportModal()" style="margin-left: 10px; padding: 4px 10px; font-size: 11px;">Apoiar</button>
    </div>

    <!-- Google AdSense Banner Ad -->
    <div style="text-align: center; padding: 10px; background: #f9f9f9;">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="pub-5545529393172719"
             data-ad-slot="5163475844"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <!-- Main Content -->
    <main class="main">
        <div id="gamesContainer" class="container">
            <!-- Lista de jogos agrupada por competição será carregada aqui -->
            <div id="gamesList">
                <!-- Skeleton/Loading state -->
                <div style="padding: 20px; text-align: center; color: #888;">Carregando jogos...</div>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" style="display: none; padding: 40px 20px; text-align: center; color: #888;">
            <p id="emptyStateText">Nenhum jogo agendado para esta data.</p>
        </div>
    </main>

    <!-- Support Modal -->
    <div id="supportModal" class="modal-admin" style="display: none;">
        <div class="modal-admin-content">
            <div class="modal-admin-header" style="display: flex; justify-content: space-between;">
                <span>Apoie a VukaSport</span>
                <button onclick="closeSupportModal()" style="background:none; border:none; color:white; font-size:20px;">&times;</button>
            </div>
            <p style="font-size: 13px; margin-bottom: 15px; color: #ccc;">Sua contribuição ajuda a manter os servidores ativos.</p>
            <div style="background: #333; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 15px;">
                <p style="font-size: 11px; color: #888; margin-bottom: 5px;">M-Pesa Moçambique</p>
                <p style="font-size: 20px; font-weight: 800; color: #28A745;">852092063</p>
            </div>
            <button class="btn-primary btn-large" onclick="copyNumber()">Copiar Número</button>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 VukaSport • <span id="developerName" style="cursor:pointer">Marcos Nhachale</span></p>
        <p id="offlineIndicator" style="display: none; color: #dc3545; margin-top: 5px;">⚠️ Modo Offline</p>
    </footer>

    <!-- Scripts -->
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script src="js/auth.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/events.js"></script>
    <script src="js/sample-data.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Lógica de UI específica da página
        let selectedDate = new Date().toISOString().split('T')[0];
        let showLiveOnly = true; // Mostrar ao vivo por padrão

        function renderDateNav() {
            const dateList = document.getElementById('dateList');
            dateList.innerHTML = '';
            
            const today = new Date();
            const dates = [];
            
            for (let i = -3; i <= 4; i++) {
                const d = new Date();
                d.setDate(today.getDate() + i);
                dates.push(d);
            }
            
            dates.forEach(date => {
                const dateStr = date.toISOString().split('T')[0];
                const btn = document.createElement('button');
                btn.className = `date-item ${dateStr === selectedDate ? 'active' : ''}`;
                
                let label = '';
                const dayDiff = Math.floor((date - new Date().setHours(0,0,0,0)) / (1000 * 60 * 60 * 24));
                
                if (dayDiff === 0) label = 'HOJE';
                else if (dayDiff === -1) label = 'ONTEM';
                else if (dayDiff === 1) label = 'AMANHÃ';
                else {
                    const days = ['DOM', 'SEG', 'TER', 'QUA', 'QUI', 'SEX', 'SÁB'];
                    label = `${days[date.getDay()]} ${date.getDate()}`;
                }
                
                btn.textContent = label;
                btn.onclick = () => {
                    selectedDate = dateStr;
                    renderDateNav();
                    if (window.gameManager) window.gameManager.renderGames();
                };
                dateList.appendChild(btn);
            });
        }

        function toggleView(viewType) {
            const dateNav = document.getElementById('dateNav');
            const btnLiveView = document.getElementById('btnLiveView');
            const btnDateView = document.getElementById('btnDateView');
            const emptyStateText = document.getElementById('emptyStateText');

            if (viewType === 'live') {
                showLiveOnly = true;
                window.showLiveOnly = true;
                dateNav.style.display = 'none';
                btnLiveView.style.background = '#28A745';
                btnLiveView.style.color = 'white';
                btnDateView.style.background = '#333';
                btnDateView.style.color = '#888';
                emptyStateText.textContent = 'Nenhum jogo ao vivo neste momento.';
            } else {
                showLiveOnly = false;
                window.showLiveOnly = false;
                dateNav.style.display = 'block';
                btnLiveView.style.background = '#333';
                btnLiveView.style.color = '#888';
                btnDateView.style.background = '#28A745';
                btnDateView.style.color = 'white';
                emptyStateText.textContent = 'Nenhum jogo agendado para esta data.';
            }

            if (window.gameManager) window.gameManager.renderGames();
        }

        document.getElementById('btnLiveView').onclick = () => toggleView('live');
        document.getElementById('btnDateView').onclick = () => toggleView('date');

        function openSupportModal() { document.getElementById('supportModal').style.display = 'flex'; }
        function closeSupportModal() { document.getElementById('supportModal').style.display = 'none'; }
        function copyNumber() {
            navigator.clipboard.writeText('852092063');
            alert('Número copiado!');
        }

        let devClicks = 0;
        document.getElementById('developerName').onclick = () => {
            devClicks++;
            if (devClicks >= 6) window.location.href = 'admin.html';
            setTimeout(() => devClicks = 0, 2000);
        };

        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.onclick = () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('vukasport_theme', 'light');
                darkModeToggle.textContent = '🌙';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('vukasport_theme', 'dark');
                darkModeToggle.textContent = '☀️';
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderDateNav();
            window.showLiveOnly = true;
            if (window.gameManager) window.gameManager.renderGames();
            
            if (localStorage.getItem('vukasport_theme') === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                darkModeToggle.textContent = '☀️';
            }
        });
    </script>
</body>
</html>
