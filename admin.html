<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VukaSport - Admin Só Edição</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background-color: #121212; color: white; }
        .admin-section { display: none; }
        .active { display: block; }
        .admin-header-compact {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }
        .admin-header-compact h2 {
            margin: 0;
            font-size: 18px;
        }
        .admin-header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .user-count-badge {
            background: #28A745;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: none;
        }
        .user-count-badge.active {
            display: inline-block;
        }
    </style>
</head>
<body class="admin-body">
    <!-- Login Section -->
    <section id="loginSection" class="admin-only-panel active" style="padding-top: 50px;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 style="color: #28A745;">⚽ VukaSport Admin</h1>
            <p style="color: #888; font-size: 14px;">Painel de Controlo em Tempo Real</p>
        </div>
        
        <form id="loginForm" style="background: #1e1e1e; padding: 20px; border-radius: 12px;">
            <div style="margin-bottom: 15px;">
                <label style="display:block; margin-bottom:5px; font-size:12px; color:#888;">Utilizador</label>
                <input type="text" id="username" style="width:100%; padding:12px; background:#333; border:1px solid #444; color:white; border-radius:8px;" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; margin-bottom:5px; font-size:12px; color:#888;">Palavra-passe</label>
                <input type="password" id="password" style="width:100%; padding:12px; background:#333; border:1px solid #444; color:white; border-radius:8px;" required>
            </div>
            <button type="submit" class="btn-primary btn-large">ENTRAR</button>
            <p id="loginError" style="color:#dc3545; font-size:12px; margin-top:10px; display:none; text-align:center;">Credenciais inválidas.</p>
        </form>
    </section>

    <!-- Admin Section -->
    <section id="adminSection" class="admin-section">
        <div class="admin-only-panel">
            <div class="admin-header-compact">
                <h2>⚽ SÓ EDIÇÃO</h2>
                <div class="admin-header-controls">
                    <div class="user-count-badge" id="activeUserCount">
                        👥 <span id="userCountValue">0</span> ativos
                    </div>
                    <button id="logoutBtn" style="background:none; border:none; color:#888; font-size:12px;">Sair</button>
                </div>
            </div>

            <!-- Seleção de Jogo -->
            <div style="margin-bottom: 20px;">
                <select id="gameSelect" style="width:100%; padding:12px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:8px; font-weight:bold;">
                    <option value="">SELECIONAR JOGO PARA EDITAR</option>
                </select>
                <button id="btnNewGame" style="width:100%; margin-top:10px; padding:8px; background:none; border:1px dashed #444; color:#888; font-size:11px; border-radius:8px;">+ ADICIONAR NOVO JOGO</button>
            </div>

            <div id="editorContainer" style="display: none;">
                <!-- Botão de Eliminar Jogo -->
                <div style="margin-bottom: 15px;">
                    <button id="btnDeleteGame" style="width:100%; padding:10px; background:#dc3545; color:white; border:none; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer; display:none;" title="Eliminar este jogo">🗑️ ELIMINAR JOGO</button>
                </div>

                <!-- Seleção de Fase do Jogo -->
                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Fase do Jogo</label>
                    <select id="gamePhase" style="width:100%; padding:10px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:8px; font-weight:bold;">
                        <option value="first">1ª PARTE</option>
                        <option value="halftime">INTERVALO</option>
                        <option value="second">2ª PARTE</option>
                        <option value="extra">PROLONGAMENTO</option>
                    </select>
                </div>

                <!-- Data e Hora de Início do Jogo -->
                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Data de Início</label>
                    <input type="date" id="gameStartDate" style="width:100%; padding:10px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:8px; font-weight:bold;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Hora de Início</label>
                    <input type="time" id="gameStartTime" style="width:100%; padding:10px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:8px; font-weight:bold;">
                </div>

                <!-- Data e Hora de Fim do Jogo -->
                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Data de Fim</label>
                    <input type="date" id="gameEndDate" style="width:100%; padding:10px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:8px; font-weight:bold;">
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Hora de Fim</label>
                    <input type="time" id="gameEndTime" style="width:100%; padding:10px; background:#1e1e1e; border:1px solid #333; color:white; border-radius:8px; font-weight:bold;">
                </div>

                <!-- Botão Terminar Jogo -->
                <div style="margin-bottom: 15px;">
                    <button id="btnFinishGame" style="width:100%; padding:10px; background:#ff6b6b; color:white; border:none; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer; display:none;" title="Terminar o jogo imediatamente">🏁 TERMINAR JOGO</button>
                </div>

                <!-- Botões de Agendamento e Adiamento -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                    <button id="btnScheduleGame" style="padding:10px; background:#007bff; color:white; border:none; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer; display:none;" title="Agendar jogo">📅 AGENDAR</button>
                    <button id="btnPostponeGame" style="padding:10px; background:#ffc107; color:white; border:none; border-radius:8px; font-size:12px; font-weight:bold; cursor:pointer; display:none;" title="Adiar jogo">⏸️ ADIAR</button>
                </div>

                <!-- Controle de Tempo -->
                <div class="time-control">
                    <button id="btnPlayPause" class="btn-play-pause">▶️</button>
                    <div class="minute-edit">
                        <label>Minutos de Jogo</label>
                        <input type="number" id="gameMinute" class="minute-input" value="0">
                    </div>
                </div>

                <!-- Placar Interativo -->
                <div class="score-control">
                    <div class="score-grid">
                        <div class="team-score-edit">
                            <span id="homeName" class="team-score-name">CASA</span>
                            <div id="homeScore" class="score-value">0</div>
                            <div class="score-btns">
                                <button onclick="adjustScore('home', -1)" class="btn-score btn-minus">-</button>
                                <button onclick="adjustScore('home', 1)" class="btn-score btn-plus">+</button>
                            </div>
                        </div>
                        <div style="font-size: 20px; font-weight: 800; color: #444;">VS</div>
                        <div class="team-score-edit">
                            <span id="awayName" class="team-score-name">VISITANTE</span>
                            <div id="awayScore" class="score-value">0</div>
                            <div class="score-btns">
                                <button onclick="adjustScore('away', -1)" class="btn-score btn-minus">-</button>
                                <button onclick="adjustScore('away', 1)" class="btn-score btn-plus">+</button>
                            </div>
                        </div>
                    </div>
                    
                    <button id="btnRegisterEvent" class="event-register-btn">REGISTAR EVENTO (GOLO/CARTÃO)</button>
                </div>

                <!-- Log de Eventos -->
                <div class="event-log">
                    <h3>EVENTOS REGISTADOS</h3>
                    <div id="eventList">
                        <!-- Eventos aqui -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Modal Novo Jogo -->
    <div id="newGameModal" class="modal-admin" style="display: none;">
        <div class="modal-admin-content">
            <div class="modal-admin-header">Criar Novo Jogo</div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Equipa Casa</label>
                <input type="text" id="inputHomeTeam" placeholder="Nome da equipa" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Equipa Visitante</label>
                <input type="text" id="inputAwayTeam" placeholder="Nome da equipa" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Competição</label>
                <input type="text" id="inputCompetition" placeholder="Ex: Campeonato" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Data do Jogo</label>
                <input type="date" id="inputGameDate" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Hora do Jogo</label>
                <input type="time" id="inputGameTime" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="btnConfirmNewGame" class="btn-primary" style="flex:1;">CRIAR JOGO</button>
                <button id="btnCancelNewGame" style="flex:1; background:#444; color:white; border:none; border-radius:6px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- Modal Agendamento -->
    <div id="scheduleModal" class="modal-admin" style="display: none;">
        <div class="modal-admin-content">
            <div class="modal-admin-header">Agendar Jogo</div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Nova Data</label>
                <input type="date" id="scheduleGameDate" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Nova Hora</label>
                <input type="time" id="scheduleGameTime" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="btnConfirmSchedule" class="btn-primary" style="flex:1;">CONFIRMAR</button>
                <button id="btnCancelSchedule" style="flex:1; background:#444; color:white; border:none; border-radius:6px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- Modal Adiamento -->
    <div id="postponeModal" class="modal-admin" style="display: none;">
        <div class="modal-admin-content">
            <div class="modal-admin-header">Adiar Jogo</div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Nova Data</label>
                <input type="date" id="postponeGameDate" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Nova Hora</label>
                <input type="time" id="postponeGameTime" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Motivo do Adiamento</label>
                <textarea id="postponeReason" placeholder="Ex: Condições climáticas, problemas técnicos..." style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px; resize:vertical; min-height:60px;"></textarea>
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="btnConfirmPostpone" class="btn-primary" style="flex:1;">CONFIRMAR ADIAMENTO</button>
                <button id="btnCancelPostpone" style="flex:1; background:#444; color:white; border:none; border-radius:6px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- Modal Evento -->
    <div id="eventModal" class="modal-admin" style="display: none;">
        <div class="modal-admin-content">
            <div class="modal-admin-header">Registar Evento</div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Tipo</label>
                <select id="eventType" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
                    <option value="goal">⚽ GOLO</option>
                    <option value="yellow">🟨 CARTÃO AMARELO</option>
                    <option value="red">🟥 CARTÃO VERMELHO</option>
                </select>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Equipa</label>
                <select id="eventTeam" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
                    <option value="home">CASA</option>
                    <option value="away">VISITANTE</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display:block; font-size:11px; color:#888; margin-bottom:5px;">Jogador</label>
                <input type="text" id="eventPlayer" placeholder="Nome ou número" style="width:100%; padding:10px; background:#333; border:1px solid #444; color:white; border-radius:8px;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="saveEvent()" class="btn-primary" style="flex:1;">GUARDAR</button>
                <button onclick="closeEventModal()" style="flex:1; background:#444; color:white; border:none; border-radius:6px;">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="js/auth.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/events.js"></script>
    <script src="js/date-utils.js"></script>
    <script src="js/sample-data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
    <script>
        // Funções globais para botões inline
        function adjustScore(team, delta) {
            if (window.adminPanel) window.adminPanel.adjustScore(team, delta);
        }
        function saveEvent() {
            if (window.adminPanel) window.adminPanel.saveEvent();
        }
        function closeEventModal() {
            document.getElementById('eventModal').style.display = 'none';
        }
    </script>
</body>
</html>
